services:
  mysql:
    image: mysql:8.0
    container_name: course-registration-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: course_registration
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - course-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: course-registration-app:latest
    container_name: course-registration-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    networks:
      - course-net

volumes:
  mysql-data:

networks:
  course-net:
    driver: bridge
